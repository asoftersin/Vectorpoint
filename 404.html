<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Vectorpoint</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#060606">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Geist+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060606;
      --text: #f2f2f2;
      --muted: #999;
      --accent: #0099ff;
      --line: #242424;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .eyebrow {
      font-family: "Geist Mono", monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    h1 {
      font-family: "Gasoek One", sans-serif;
      font-size: clamp(40px, 8vw, 88px);
      line-height: 1.05;
      margin-bottom: 20px;
    }
    p { color: var(--muted); margin-bottom: 36px; font-size: 17px; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 28px;
      border-radius: 999px;
      transition: opacity 0.2s ease;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">404 · SIDAN SAKNAS</p>
    <h1>Det här flödet finns inte.</h1>
    <p>Sidan du letar efter har flyttats eller aldrig funnits. Men det gör inget — allt viktigt finns på startsidan.</p>
    <a class="btn" href="/">Till startsidan</a>
  </main>
</body>
</html>
